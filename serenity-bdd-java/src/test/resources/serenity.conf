serenity {
    take.screenshots = FOR_FAILURES
    test.root = "com.saucedemo"
    logging = NORMAL
}

webdriver {
    driver = chrome
    autodownload = true
}

chrome.switches = """--headless;--disable-gpu;--no-sandbox;--disable-dev-shm-usage;--window-size=1920,1080;--disable-web-security;--allow-running-insecure-content;--remote-allow-origins=*"""
